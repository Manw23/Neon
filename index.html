<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON</title>

    <!-- NEON Favicon -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='neon' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%2300f0ff'/%3E%3Cstop offset='100%25' style='stop-color:%23a020f0'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='42' fill='none' stroke='url(%23neon)' stroke-width='8'/%3E%3Ccircle cx='50' cy='50' r='28' fill='none' stroke='%2300f0ff' stroke-width='4' opacity='0.6'/%3E%3Ctext x='50' y='62' font-size='38' font-family='Arial Black' fill='%2300f0ff' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E">

    <style>
        :root {
            --titlebar-bg: #1a1a1a;
            --toolbar-bg: #1a1a1a;
            --accent: #00aaff;
            --accent-hover: #33bbff;
            --danger: #ff5555;
            --warning: #ffaa00;
            --star: #ffcc00;
            --border: #333;
            --surface: #2a2a2a;
            --surface-hover: #3a3a3a;
            --bg-dark: #0f0f0f;
            --bg-input: #111;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Title Bar */
        .titlebar {
            background: var(--titlebar-bg);
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            user-select: none;
        }
        .titlebar strong {
            background: linear-gradient(135deg, #00f0ff, #a020f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: default;
            transition: filter 0.3s;
        }
        .titlebar strong:hover { filter: brightness(1.3); }
        .titlebar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .auth-btn, .customize-btn {
            background: var(--surface);
            color: #ccc;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s, color 0.2s;
        }
        .auth-btn:hover, .customize-btn:hover { background: var(--surface-hover); color: #fff; }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #00aaff, #0088dd);
            color: #000;
            padding: 3px 10px 3px 3px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .user-badge:hover { transform: scale(1.05); box-shadow: 0 2px 10px rgba(0,170,255,0.3); }
        .user-badge.no-pic { padding: 4px 10px; }
        .user-avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            object-fit: cover;
        }
        .user-avatar-initial {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 12px;
            flex-shrink: 0;
        }
        .profile-pic-preview {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
            display: block;
            margin: 0 auto 10px;
        }

        /* Tabs Bar */
        .tabs-bar {
            background: #151515;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: #444 transparent;
            min-height: 36px;
        }
        .tabs-bar::-webkit-scrollbar { height: 3px; }
        .tabs-bar::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: #1a1a1a;
            border-right: 1px solid var(--border);
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            max-width: 180px;
            min-width: 80px;
            transition: background 0.15s;
            position: relative;
        }
        .tab:hover { background: var(--surface-hover); }
        .tab.active { background: var(--surface); border-bottom: 2px solid var(--accent); box-shadow: 0 1px 8px rgba(0,170,255,0.15); }
        .tab.dragging { opacity: 0.4; }
        .tab.drag-over { border-left: 2px solid var(--accent); }
        .tab-icon { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }
        .tab-title { overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .tab-close {
            background: none;
            border: none;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            padding: 0 2px;
            line-height: 1;
            transition: color 0.15s;
        }
        .tab-close:hover { color: var(--danger); }
        .new-tab-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding: 6px 12px;
            transition: color 0.15s, background 0.15s;
            border-radius: 6px;
        }
        .new-tab-btn:hover { color: #fff; background: var(--surface); }

        /* Bookmarks Bar */
        .bookmarks {
            background: var(--titlebar-bg);
            padding: 6px 14px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            min-height: 40px;
            align-items: center;
            scrollbar-width: thin;
            scrollbar-color: #444 transparent;
        }
        .bookmarks::-webkit-scrollbar { height: 4px; }
        .bookmarks::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        .bookmark {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: var(--surface);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: background 0.2s;
            position: relative;
        }
        .bookmark:hover { background: var(--surface-hover); }
        .bookmark img { width: 16px; height: 16px; border-radius: 2px; }
        .bookmark .delete-bm {
            display: none;
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--danger);
            color: white;
            border: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            font-size: 10px;
            cursor: pointer;
            line-height: 16px;
            text-align: center;
            padding: 0;
        }
        .bookmark:hover .delete-bm { display: block; }

        /* Toolbar */
        .toolbar {
            background: var(--toolbar-bg);
            padding: 8px 14px;
            display: flex;
            gap: 6px;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .nav-btn {
            background: var(--surface);
            color: #ccc;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover { background: var(--surface-hover); color: #fff; }
        .nav-btn:active { background: #4a4a4a; }
        .nav-btn.spinning { animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Search / Address Bar */
        .search-container { flex: 1; display: flex; align-items: center; position: relative; }
        #address {
            flex: 1;
            padding: 9px 16px;
            padding-right: 36px;
            background: var(--bg-input);
            border: 2px solid #444;
            border-radius: 50px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        #address:focus { border-color: var(--accent); box-shadow: 0 0 12px rgba(0,170,255,0.15); }
        #address::placeholder { color: #666; }
        .clear-btn {
            position: absolute;
            right: 10px;
            background: none;
            color: #888;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .clear-btn:hover { color: #fff; }
        .star-btn {
            background: var(--surface);
            color: var(--star);
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .star-btn:hover { background: var(--surface-hover); }
        .go-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 9px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .go-btn:hover { background: var(--accent-hover); }
        .go-btn:active { transform: scale(0.95); }
        .real-tab-btn {
            background: var(--warning);
            color: #000;
            border: none;
            padding: 9px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .real-tab-btn:hover { background: #ffcc33; }

        /* Main Content Area */
        .main {
            flex: 1;
            position: relative;
            background: #000;
            background-size: cover;
            background-position: center;
        }
        .main iframe { width: 100%; height: 100%; border: none; background: white; position: absolute; inset: 0; }

        /* Loading Bar */
        .loading-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #00f0ff, #a020f0, #00f0ff);
            background-size: 200% 100%;
            animation: loading-slide 1s linear infinite;
            z-index: 10;
            display: none;
            width: 100%;
        }
        @keyframes loading-slide {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Home Screen */
        .home {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(17, 17, 17, 0.9);
            text-align: center;
            padding: 40px;
            gap: 16px;
            z-index: 5;
        }
        .home h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #00f0ff, #a020f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 6px;
            text-shadow: 0 0 30px rgba(0,240,255,0.3);
            animation: neon-pulse 3s ease-in-out infinite alternate;
        }
        @keyframes neon-pulse {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.2); }
        }
        .home p { color: var(--warning); font-size: 14px; }
        .home input {
            width: 90%;
            max-width: 560px;
            padding: 14px 22px;
            font-size: 16px;
            border-radius: 50px;
            background: #1a1a1a;
            border: 2px solid #444;
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }
        .home input:focus { border-color: var(--accent); }
        .home input::placeholder { color: #666; }
        .home-shortcuts {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .shortcut-tile {
            width: 80px;
            height: 80px;
            background: var(--surface);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            text-decoration: none;
            color: #ccc;
        }
        .shortcut-tile:hover { background: var(--surface-hover); transform: scale(1.05); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
        .shortcut-tile img { width: 28px; height: 28px; border-radius: 4px; }
        .shortcut-tile span { font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70px; }

        /* Customize Panel */
        .panel {
            position: absolute;
            top: 40px;
            right: 15px;
            background: #1f1f1f;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 16px;
            width: 260px;
            z-index: 999;
            display: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .panel h4 { margin-bottom: 12px; color: var(--accent); }
        .panel label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
            margin-bottom: 4px;
        }
        .panel input[type="color"] {
            width: 100%;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
        }
        .panel input[type="file"] {
            width: 100%;
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }
        .panel button {
            margin-top: 10px;
            width: 100%;
            padding: 9px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .panel button:hover { background: var(--accent-hover); }
        .panel .reset { background: var(--danger); color: white; }
        .panel .reset:hover { background: #ff7777; }

        /* Auth Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; animation: fade-in 0.2s ease; }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: #1f1f1f;
            border: 1px solid #444;
            border-radius: 16px;
            padding: 28px;
            width: 340px;
            max-width: 90%;
        }
        .modal h3 {
            color: var(--accent);
            margin-bottom: 16px;
            text-align: center;
        }
        .modal input[type="text"], .modal input[type="email"], .modal input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            background: #111;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
            margin-bottom: 10px;
        }
        .modal input:focus { border-color: var(--accent); }
        .modal .modal-btn {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-top: 6px;
        }
        .modal .modal-btn:hover { background: var(--accent-hover); }
        .modal .modal-btn.secondary {
            background: var(--surface);
            color: #ccc;
            margin-top: 8px;
        }
        .modal .modal-btn.secondary:hover { background: var(--surface-hover); color: #fff; }
        .modal .modal-btn.danger { background: var(--danger); color: white; }
        .modal .error-msg { color: var(--danger); font-size: 12px; margin-top: 4px; }
        .modal .modal-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: linear-gradient(135deg, #1a2a3a, #1f1f1f);
            color: #fff;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 3000;
            transition: transform 0.3s ease, opacity 0.3s ease;
            border: 1px solid var(--accent);
            box-shadow: 0 4px 20px rgba(0,170,255,0.2);
            opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Tab Context Menu */
        .tab-context-menu {
            position: fixed;
            background: #1f1f1f;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 4px 0;
            min-width: 160px;
            z-index: 5000;
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .tab-context-menu.show { display: block; }
        .tab-context-menu button {
            display: block;
            width: 100%;
            padding: 8px 16px;
            background: none;
            border: none;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
            text-align: left;
        }
        .tab-context-menu button:hover { background: var(--surface-hover); color: #fff; }
        .tab-context-menu .divider { height: 1px; background: #444; margin: 4px 0; }

        /* Responsive */
        @media (max-width: 768px) {
            .real-tab-btn span { display: none; }
            .real-tab-btn { padding: 9px 10px; }
            .go-btn { padding: 9px 14px; }
            .toolbar { padding: 6px 8px; gap: 4px; }
        }
    </style>
</head>
<body>

    <div class="titlebar">
        <strong>NEON</strong>
        <div class="titlebar-right">
            <span id="authArea"></span>
            <button class="customize-btn" onclick="togglePanel()">⚙ Customize</button>
        </div>
    </div>

    <div class="tabs-bar" id="tabsBar">
        <button class="new-tab-btn" onclick="createTab()" title="New Tab (Ctrl+T)">+</button>
    </div>

    <div class="bookmarks" id="bookmarks"></div>

    <div class="toolbar">
        <button class="nav-btn" onclick="back()" title="Back (Alt+←)">←</button>
        <button class="nav-btn" onclick="forward()" title="Forward (Alt+→)">→</button>
        <button class="nav-btn" onclick="refresh()" title="Refresh">⟳</button>
        <button class="nav-btn" onclick="goHome()" title="Home">⌂</button>

        <div class="search-container">
            <input type="text" id="address" placeholder="Search or type a URL" onkeypress="if(event.key==='Enter') go()">
            <button class="clear-btn" onclick="clearAddress()" title="Clear">×</button>
        </div>

        <button class="star-btn" onclick="starCurrent()" title="Bookmark this page">★</button>
        <button class="go-btn" onclick="go()">Go</button>
        <button class="real-tab-btn" onclick="openRealTab()" title="Open in a real browser tab">🔗 New Tab</button>
    </div>

    <div class="main" id="main">
        <div class="loading-bar" id="loadingBar"></div>
        <div id="home" class="home">
            <h1>NEON</h1>
            <p>↑ Your bookmarks are above</p>
            <input type="text" id="bigsearch" placeholder="Search the web or type a URL..." onkeypress="if(event.key==='Enter') quickGo()">
            <div class="home-shortcuts" id="homeShortcuts"></div>
        </div>
    </div>

    <div class="panel" id="panel">
        <h4>Customize NEON</h4>
        <label>Title Bar Color</label>
        <input type="color" id="titlebarColor" value="#1a1a1a" oninput="updateColors()">
        <label>Toolbar Color</label>
        <input type="color" id="toolbarColor" value="#1a1a1a" oninput="updateColors()">

        <label style="margin-top:14px;display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#ccc">

        </label>

        <div class="modal" id="authModalContent"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_URL = "https://50536b280dca-tunnel-iuznimg9.devinapps.com";
        const TUNNEL_AUTH = "Basic " + btoa("user:381726b2f384fffdd3f0af715f6688e9");
        async function apiFetch(path, opts = {}) {
            const headers = Object.assign({}, opts.headers || {});
            headers["Authorization"] = TUNNEL_AUTH;
            const res = await fetch(API_URL + path, {
                method: opts.method || "GET",
                headers,
                body: opts.body || undefined
            });
            return {
                ok: res.ok,
                status: res.status,
                json: () => res.json(),
                text: () => res.text()
            };
        }
        const addressBar = document.getElementById("address");
        const home = document.getElementById("home");
        const mainArea = document.getElementById("main");
        const panel = document.getElementById("panel");
        const loadingBar = document.getElementById("loadingBar");

        // ==================== TABS ====================
        let tabs = [];
        let activeTabId = null;
        let tabIdCounter = 0;

        function createTab(url) {
            const id = tabIdCounter++;
            const iframe = document.createElement("iframe");
            iframe.id = "frame-" + id;
            iframe.style.display = "none";
            iframe.sandbox = "allow-same-origin allow-scripts allow-popups allow-forms allow-popups-to-escape-sandbox";
            iframe.addEventListener("load", () => { loadingBar.style.display = "none"; });
            mainArea.appendChild(iframe);

            const tab = {
                id,
                title: "New Tab",
                url: url || "",
                navHistory: [],
                pos: -1,
                iframe
            };
            tabs.push(tab);
            switchTab(id);

            if (url) {
                navigateInTab(tab, url);
            }

            renderTabs();
            return tab;
        }

        function switchTab(id) {
            tabs.forEach(t => {
                t.iframe.style.display = "none";
            });
            activeTabId = id;
            const tab = getActiveTab();
            if (!tab) return;

            if (tab.pos >= 0 && tab.navHistory.length > 0) {
                tab.iframe.style.display = "block";
                home.style.display = "none";
                addressBar.value = tab.navHistory[tab.pos];
            } else {
                home.style.display = "flex";
                addressBar.value = "";
                document.getElementById("bigsearch").value = "";
            }
            renderTabs();
        }

        function closeTab(id, e) {
            if (e) e.stopPropagation();
            if (tabs.length <= 1) {
                showToast("Can't close the last tab");
                return;
            }
            const idx = tabs.findIndex(t => t.id === id);
            const tab = tabs[idx];
            tab.iframe.remove();
            tabs.splice(idx, 1);

            if (activeTabId === id) {
                const newIdx = Math.min(idx, tabs.length - 1);
                switchTab(tabs[newIdx].id);
            }
            renderTabs();
        }

        function getActiveTab() {
            return tabs.find(t => t.id === activeTabId);
        }

        let useProxy = localStorage.getItem('neon_proxy') === 'true';

        function proxyUrl(url) {
            if (!useProxy) return url;
            if (url.includes('api.allorigins.win')) return url;
            return "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
        }

        function navigateInTab(tab, url) {
            if (tab.pos < tab.navHistory.length - 1) {
                tab.navHistory = tab.navHistory.slice(0, tab.pos + 1);
            }
            tab.navHistory.push(url);
            tab.pos = tab.navHistory.length - 1;
            tab.url = url;
            const hostname = url.replace(/^https?:\/\//, '').split('/')[0] || "New Tab";
            tab.title = hostname;
            tab.icon = "https://www.google.com/s2/favicons?domain=" + hostname + "&sz=32";

            home.style.display = "none";
            tab.iframe.style.display = "block";
            showLoading();
            tab.iframe.src = proxyUrl(url);
            addressBar.value = url;
            renderTabs();
            saveNavState();
        }

        let dragTabId = null;

        function renderTabs() {
            const bar = document.getElementById("tabsBar");
            const addBtn = bar.querySelector(".new-tab-btn");
            bar.querySelectorAll(".tab").forEach(el => el.remove());

            tabs.forEach((tab, idx) => {
                const div = document.createElement("div");
                div.className = "tab" + (tab.id === activeTabId ? " active" : "");
                div.draggable = true;
                div.dataset.tabIdx = idx;
                div.onclick = () => switchTab(tab.id);

                div.addEventListener("dragstart", (e) => {
                    dragTabId = tab.id;
                    div.classList.add("dragging");
                    e.dataTransfer.effectAllowed = "move";
                });
                div.addEventListener("dragend", () => {
                    dragTabId = null;
                    div.classList.remove("dragging");
                    bar.querySelectorAll(".tab").forEach(t => t.classList.remove("drag-over"));
                });
                div.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = "move";
                    bar.querySelectorAll(".tab").forEach(t => t.classList.remove("drag-over"));
                    if (dragTabId !== tab.id) div.classList.add("drag-over");
                });
                div.addEventListener("dragleave", () => {
                    div.classList.remove("drag-over");
                });
                div.addEventListener("drop", (e) => {
                    e.preventDefault();
                    div.classList.remove("drag-over");
                    if (dragTabId === null || dragTabId === tab.id) return;
                    const fromIdx = tabs.findIndex(t => t.id === dragTabId);
                    const toIdx = tabs.findIndex(t => t.id === tab.id);
                    if (fromIdx < 0 || toIdx < 0) return;
                    const [moved] = tabs.splice(fromIdx, 1);
                    tabs.splice(toIdx, 0, moved);
                    renderTabs();
                });

                if (tab.pos >= 0 && tab.icon) {
                    const icon = document.createElement("img");
                    icon.className = "tab-icon";
                    icon.src = tab.icon;
                    icon.alt = "";
                    icon.onerror = () => { icon.style.display = "none"; };
                    div.appendChild(icon);
                }

                const title = document.createElement("span");
                title.className = "tab-title";
                title.textContent = tab.pos >= 0 ? tab.title : "New Tab";
                div.appendChild(title);

                div.addEventListener("contextmenu", (e) => {
                    e.preventDefault();
                    showTabContextMenu(e, tab.id);
                });

                const close = document.createElement("button");
                close.className = "tab-close";
                close.textContent = "×";
                close.onclick = (e) => closeTab(tab.id, e);
                div.appendChild(close);

                bar.insertBefore(div, addBtn);
            });
        }

        function showTabContextMenu(e, tabId) {
            const menu = document.getElementById("tabCtxMenu");
            menu.innerHTML = '';
            const items = [
                { label: 'Duplicate Tab', action: () => { const t = tabs.find(t2 => t2.id === tabId); if (t && t.pos >= 0) createTab(t.navHistory[t.pos]); }},
                { label: 'Close Tab', action: () => closeTab(tabId) },
                { label: 'Close Other Tabs', action: () => { tabs.filter(t => t.id !== tabId).forEach(t => closeTab(t.id)); }},
            ];
            items.forEach(item => {
                const btn = document.createElement('button');
                btn.textContent = item.label;
                btn.onclick = () => { item.action(); menu.classList.remove('show'); };
                menu.appendChild(btn);
            });
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            menu.classList.add('show');
        }
        document.addEventListener('click', () => {
            document.getElementById("tabCtxMenu").classList.remove('show');
        });

        // ==================== TOAST ====================
        function showToast(msg, duration = 2000) {
            const toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), duration);
        }

        // ==================== NAV STATE ====================
        function saveNavState() {
            const tab = getActiveTab();
            if (!tab) return;
            const url = (tab.pos >= 0 && tab.pos < tab.navHistory.length) ? tab.navHistory[tab.pos] : '';
            localStorage.setItem('neon_current_url', url);
            saveAllTabs();
        }
        function saveAllTabs() {
            const data = tabs.map(t => ({
                id: t.id,
                title: t.title,
                url: t.url,
                navHistory: t.navHistory,
                pos: t.pos,
                icon: t.icon
            }));
            localStorage.setItem('neon_tabs', JSON.stringify(data));
            const act = getActiveTab();
            if (act) localStorage.setItem('neon_active_tab', String(act.id));
        }
        window.addEventListener('beforeunload', saveAllTabs);

        function deleteBookmark(index) {
            const removed = bookmarks[index];
            bookmarks.splice(index, 1);

            renderBookmarks();
            showToast("Removed: " + removed.name);

            const tab = getActiveTab();
            if (!tab) return;
            navigateInTab(tab, url);
        }

        function starCurrent() {
            let input = addressBar.value.trim();
            if (!input) { showToast("Type a URL first, then click ★"); return; }
            let url = input.startsWith("http") ? input : "https://" + input;
            let name = url.replace(/^https?:\/\//, '').split('/')[0];
            if (bookmarks.some(b => b.url === url)) { showToast("Already bookmarked!"); return; }
            bookmarks.push({ name, url, icon: "https://icons.duckduckgo.com/ip3/" + name + ".ico" });
            localStorage.setItem("neon_bookmarks", JSON.stringify(bookmarks));
            renderBookmarks();
            showToast("Bookmarked: " + name);

        // ==================== NAVIGATION ====================
        function go() {
            let input = addressBar.value.trim();
            if (!input) return;
            const tab = getActiveTab();
            if (!tab) return;
            let targetUrl;
            if (input.includes(".") && !input.includes(" ")) {
                targetUrl = input.startsWith("http") ? input : "https://" + input;
                addressBar.value = targetUrl;
            } else {
                targetUrl = "https://www.google.com/search?igu=1&q=" + encodeURIComponent(input);
            }
            navigateInTab(tab, targetUrl);
        }

        function quickGo() {
            addressBar.value = document.getElementById("bigsearch").value.trim();
            go();
        }

        function back() {
            const tab = getActiveTab();
            if (!tab) return;
            if (tab.pos > 0) {
                tab.pos--;
                showLoading();
                tab.iframe.src = proxyUrl(tab.navHistory[tab.pos]);
                addressBar.value = tab.navHistory[tab.pos];
                const h1 = tab.navHistory[tab.pos].replace(/^https?:\/\//, '').split('/')[0];
                tab.title = h1;
                tab.icon = "https://www.google.com/s2/favicons?domain=" + h1 + "&sz=32";
                renderTabs();
                saveNavState();
            } else if (tab.pos === 0) {
                tab.pos = -1;
                tab.iframe.style.display = "none";
                home.style.display = "flex";
                addressBar.value = "";
                tab.title = "New Tab";
                tab.icon = null;
                renderTabs();
                localStorage.removeItem('neon_current_url');
            }
        }

        function forward() {
            const tab = getActiveTab();
            if (!tab) return;
            if (tab.pos < tab.navHistory.length - 1) {
                tab.pos++;
                home.style.display = "none";
                tab.iframe.style.display = "block";
                showLoading();
                tab.iframe.src = proxyUrl(tab.navHistory[tab.pos]);
                addressBar.value = tab.navHistory[tab.pos];
                const h2 = tab.navHistory[tab.pos].replace(/^https?:\/\//, '').split('/')[0];
                tab.title = h2;
                tab.icon = "https://www.google.com/s2/favicons?domain=" + h2 + "&sz=32";
                renderTabs();
                saveNavState();
            }
        }

        function refresh() {
            const tab = getActiveTab();
            if (!tab || tab.iframe.style.display === "none") return;
            showLoading();
            const btn = document.querySelector('[onclick="refresh()"]');
            if (btn) btn.classList.add('spinning');
            tab.iframe.addEventListener('load', () => { if (btn) btn.classList.remove('spinning'); }, {once: true});
            try {
                tab.iframe.contentWindow.location.reload();
            } catch (e) {
                tab.iframe.src = tab.iframe.src;
            }
        }

        function goHome() {
            const tab = getActiveTab();
            if (!tab) return;
            tab.pos = -1;
            tab.iframe.style.display = "none";
            home.style.display = "flex";
            addressBar.value = "";
            tab.title = "New Tab";
            tab.icon = null;
            document.getElementById("bigsearch").value = "";
            document.getElementById("bigsearch").focus();
            renderTabs();
            localStorage.removeItem('neon_current_url');
        }

        function openRealTab() {
            let input = addressBar.value.trim();
            if (!input) { showToast("Type a URL first!"); return; }
            let url = input.startsWith("http") ? input : "https://" + input;
            const newTab = window.open(url, '_blank');
            setTimeout(() => {
                if (!newTab || newTab.closed || typeof newTab.closed === 'undefined') {
                    navigator.clipboard.writeText(url).then(() => {
                        showToast("Popup blocked — URL copied! Paste in a new tab.");
                    }).catch(() => {
                        prompt("Copy this URL:", url);
                    });
                }
            }, 700);
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        document.addEventListener("keydown", (e) => {
            if (e.altKey && e.key === "ArrowLeft") { e.preventDefault(); back(); }
            if (e.altKey && e.key === "ArrowRight") { e.preventDefault(); forward(); }
            if (e.altKey && e.key === "Home") { e.preventDefault(); goHome(); }
            if (e.key === "F5") { e.preventDefault(); refresh(); }
            if (e.key === "Escape" && panel.style.display === "block") { panel.style.display = "none"; }
            if (e.ctrlKey && e.key === "t") { e.preventDefault(); createTab(); }
            if (e.ctrlKey && e.key === "w") { e.preventDefault(); if (activeTabId !== null) closeTab(activeTabId); }
            if (e.ctrlKey && e.key === "l") { e.preventDefault(); addressBar.select(); addressBar.focus(); }
            if (e.ctrlKey && e.key === "k") { e.preventDefault(); addressBar.value = ""; addressBar.focus(); }
        });

        async function doChangePassword() {
            const current = document.getElementById('currentPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;
            const errEl = document.getElementById('authError');
            if (!current || !newPass) { errEl.textContent = 'Fill in all fields'; return; }
            if (newPass.length < 4) { errEl.textContent = 'New password must be 4+ characters'; return; }
            if (newPass !== confirm) { errEl.textContent = 'Passwords do not match'; return; }
            errEl.textContent = '';
            try {
                const res = await apiFetch('/change-password', {
                    method: 'POST',
                    headers: { 'X-Auth-Token': authToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_password: current, new_password: newPass })
                });
                const data = await res.json();
                if (!res.ok) { errEl.textContent = data.detail || 'Failed'; return; }
                showToast('Password changed!');
                showAccountModal();
            } catch (e) {
                errEl.textContent = "Can't reach server right now";
            }
        }

        function closeAuthModal() {
            document.getElementById("authModal").classList.remove("show");
        }

        async function doLogin() {
            const email = document.getElementById("loginEmail").value.trim();
            const pass = document.getElementById("loginPass").value;
            const errEl = document.getElementById("authError");
            if (!email || !pass) { errEl.textContent = "Fill in both fields"; return; }
            errEl.textContent = "";
            try {
                const res = await apiFetch("/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({email, password: pass})
                });
                const data = await res.json();
                if (!res.ok) { errEl.textContent = data.detail || "Login failed"; return; }
                authToken = data.token;
                currentUser = {email: data.email, display_name: data.display_name};
                localStorage.setItem('neon_token', authToken);
                closeAuthModal();
                renderAuthArea();
                showToast("Welcome back, " + (currentUser.display_name || currentUser.email) + "!");
                loadFromCloud();
            } catch (e) {
                errEl.textContent = "Can't reach server. Sign-in is optional — your bookmarks save locally!";
            }
        }

        async function doRegister() {
            const name = document.getElementById("regName").value.trim();
            const email = document.getElementById("regEmail").value.trim();
            const pass = document.getElementById("regPass").value;
            const errEl = document.getElementById("authError");
            if (!email || !pass) { errEl.textContent = "Email and password required"; return; }
            if (pass.length < 4) { errEl.textContent = "Password must be 4+ characters"; return; }
            errEl.textContent = "";
            try {
                const res = await apiFetch("/register", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({email, password: pass, display_name: name})
                });
                const data = await res.json();
                if (!res.ok) { errEl.textContent = data.detail || "Registration failed"; return; }
                authToken = data.token;
                currentUser = {email: data.email, display_name: data.display_name};
                localStorage.setItem('neon_token', authToken);
                closeAuthModal();
                renderAuthArea();
                showToast("Account created! Welcome, " + currentUser.display_name + "!");
                syncToCloud();
            } catch (e) {
                errEl.textContent = "Can't reach server. Sign-in is optional — your bookmarks save locally!";
            }
        }

        function doLogout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('neon_token');
            closeAuthModal();
            renderAuthArea();
            showToast("Signed out");
        }

        async function loadFromCloud() {
            if (!authToken) return;
            try {
                const res = await apiFetch("/profile", {
                    headers: {"X-Auth-Token": authToken}
                });
                if (!res.ok) {
                    if (res.status === 401) { doLogout(); return; }
                    return;
                }
                const data = await res.json();
                currentUser = {email: data.email, display_name: data.display_name, profile_pic: data.profile_pic || null};
                if (data.profile_pic) localStorage.setItem('neon_profile_pic', data.profile_pic);
                renderAuthArea();
                if (data.bookmarks && data.bookmarks.length > 0) {
                    bookmarks = [defaultBookmark, ...data.bookmarks.filter(b => b.url !== defaultBookmark.url)];
                    localStorage.setItem("neon_bookmarks", JSON.stringify(bookmarks));
                    renderBookmarks();
                }
                if (data.titlebar_color) {
                    document.documentElement.style.setProperty('--titlebar-bg', data.titlebar_color);
                    document.getElementById("titlebarColor").value = data.titlebar_color;
                    localStorage.setItem('neon_titlebar', data.titlebar_color);
                }
                if (data.toolbar_color) {
                    document.documentElement.style.setProperty('--toolbar-bg', data.toolbar_color);
                    document.getElementById("toolbarColor").value = data.toolbar_color;
                    localStorage.setItem('neon_toolbar', data.toolbar_color);
                }
            } catch (e) {}
        }

        async function syncToCloud() {
            if (!authToken) return;
            try {
                const userBookmarks = bookmarks.filter(b => b.url !== defaultBookmark.url);
                await apiFetch("/profile", {
                    method: "PUT",
                    headers: {
                        "X-Auth-Token": authToken,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        bookmarks: userBookmarks,
                        titlebar_color: localStorage.getItem('neon_titlebar'),
                        toolbar_color: localStorage.getItem('neon_toolbar'),
                        profile_pic: localStorage.getItem('neon_profile_pic') || ''
                    })
                });
            } catch (e) {}
        }

        async function doSync() {
            closeAuthModal();
            showToast("Syncing...");
            await syncToCloud();
            await loadFromCloud();
            showToast("Synced!");
        }

        // ==================== LOAD SAVED ====================
        function loadSaved() {
            const saved = localStorage.getItem("neon_bookmarks");
            if (saved) {
                try {
                    const userBookmarks = JSON.parse(saved);
                    bookmarks = [defaultBookmark, ...userBookmarks.filter(b => b.url !== defaultBookmark.url)];
                } catch (e) {
                    bookmarks = [defaultBookmark];
                }
            }
            const t = localStorage.getItem('neon_titlebar');
            const tb = localStorage.getItem('neon_toolbar');
            const bg = localStorage.getItem('neon_bg');
            if (t) { document.documentElement.style.setProperty('--titlebar-bg', t); document.getElementById("titlebarColor").value = t; }
            if (tb) { document.documentElement.style.setProperty('--toolbar-bg', tb); document.getElementById("toolbarColor").value = tb; }
            if (bg) mainArea.style.backgroundImage = `url('${bg}')`;
            document.getElementById("proxyToggle").checked = useProxy;
        }

        // ==================== INIT ====================
        function init() {
            loadSaved();
            renderBookmarks();
            renderAuthArea();

            const savedTabs = localStorage.getItem('neon_tabs');
            const savedActive = localStorage.getItem('neon_active_tab');
            if (savedTabs) {
                try {
                    const parsed = JSON.parse(savedTabs);
                    if (parsed.length > 0) {
                        parsed.forEach(t => {
                            const iframe = document.createElement("iframe");
                            iframe.id = "frame-" + tabIdCounter;
                            iframe.style.display = "none";
                            iframe.sandbox = "allow-same-origin allow-scripts allow-popups allow-forms allow-popups-to-escape-sandbox";
                            iframe.addEventListener("load", () => { loadingBar.style.display = "none"; });
                            mainArea.appendChild(iframe);
                            const tab = {
                                id: tabIdCounter++,
                                title: t.title || "New Tab",
                                url: t.url || "",
                                navHistory: t.navHistory || [],
                                pos: t.pos != null ? t.pos : -1,
                                iframe,
                                icon: t.icon || null
                            };
                            tabs.push(tab);
                            if (tab.pos >= 0 && tab.pos < tab.navHistory.length) {
                                iframe.src = proxyUrl(tab.navHistory[tab.pos]);
                            }
                        });
                        const activeId = savedActive ? parseInt(savedActive) : null;
                        const targetId = (activeId !== null && tabs.some(t2 => t2.id === activeId)) ? activeId : tabs[0].id;
                        switchTab(targetId);
                        renderTabs();
                    } else {
                        createTab();
                        setTimeout(() => addressBar.focus(), 300);
                    }
                } catch (e) {
                    createTab();
                    setTimeout(() => addressBar.focus(), 300);
                }
            } else {
                const lastUrl = localStorage.getItem('neon_current_url');
                createTab(lastUrl || undefined);
                if (!lastUrl) setTimeout(() => addressBar.focus(), 300);
            }

            if (authToken) {
                loadFromCloud();
            }
        }
        init();
    </script>
</body>
</html>
